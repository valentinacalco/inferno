<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inferno — La Ruota</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #b91c1c;
      --red-dark: #450a0a;
      --red-mid: #7f1d1d;
      --gold: #fbbf24;
      --gold-light: #fde68a;
      --stone: #a8a29e;
      --stone-dark: #78716c;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 600;
      letter-spacing: 6px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--stone);
      letter-spacing: 1px;
    }

    #wheel-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto 2rem;
    }

    #pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    #canvas {
      display: block;
      border-radius: 50%;
    }

    #spin-btn {
      display: block;
      margin: 0 auto;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 12px 48px;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }

    #spin-btn:hover { background: rgba(255,255,255,0.08); border-color: #fff; }
    #spin-btn:active { transform: scale(0.97); }
    #spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #result-box {
      display: none;
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      border: 1px solid;
      width: 100%;
      max-width: 520px;
    }

    #result-box.rosso {
      background: #0d0000;
      border-color: var(--red-mid);
    }

    #result-box.nero {
      background: #080808;
      border-color: #333;
    }

    #result-tag {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    #result-box.rosso #result-tag { color: #fca5a5; }
    #result-box.nero #result-tag { color: var(--stone); }

    #result-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    #result-desc {
      font-size: 14px;
      color: var(--stone);
      margin-bottom: 1.25rem;
      font-style: italic;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .card-link {
      display: block;
      padding: 7px 10px;
      border-radius: 7px;
      font-family: 'Crimson Text', serif;
      font-size: 14px;
      text-decoration: none;
      transition: opacity 0.15s;
      line-height: 1.3;
    }

    #result-box.rosso .card-link { background: #1f0000; color: #fca5a5; }
    #result-box.nero .card-link { background: #141414; color: #e7e5e4; }
    .card-link:hover { opacity: 0.7; }

    .card-link small {
      display: block;
      font-size: 11px;
      opacity: 0.45;
      margin-top: 2px;
      font-style: italic;
    }

    #reset-btn {
      display: block;
      margin: 1.25rem auto 0;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--stone-dark);
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 440px) {
      .cards-grid { grid-template-columns: 1fr; }
      #wheel-wrap { width: 260px; height: 260px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Inferno</h1>
  <p class="subtitle">Gira la ruota e scopri il tuo destino</p>
</header>

<div id="wheel-wrap">
  <svg id="pointer" width="24" height="28" viewBox="0 0 24 28">
    <polygon points="12,26 22,2 12,8 2,2" fill="#fff" opacity="0.9"/>
  </svg>
  <canvas id="canvas" width="300" height="300"></canvas>
</div>

<button id="spin-btn">Gira</button>

<div id="result-box">
  <span id="result-tag"></span>
  <div id="result-title"></div>
  <div id="result-desc">Scegli un personaggio:</div>
  <div class="cards-grid" id="cards-grid"></div>
  <button id="reset-btn">Gira di nuovo</button>
</div>

<script>
  /* ── DATI ─────────────────────────────────────────────────────────
     Quando hai i link reali, sostituisci "#" con l'URL della pagina
     corrispondente per ogni personaggio.
  ──────────────────────────────────────────────────────────────── */
  const carte = [
    { nome: "Selva oscura",                  rosso: "#", nero: "#" },
    { nome: "Colle Illuminato",              rosso: "#", nero: "#" },
    { nome: "La lonza",                      rosso: "#", nero: "#" },
    { nome: "Il leone",                      rosso: "#", nero: "#" },
    { nome: "La lupa",                       rosso: "#", nero: "#" },
    { nome: "Virgilio",                      rosso: "#", nero: "#" },
    { nome: "Beatrice",                      rosso: "#", nero: "#" },
    { nome: "Porta dell'Inferno",            rosso: "#", nero: "#" },
    { nome: "Ignavi",                        rosso: "#", nero: "#" },
    { nome: "Celestino V",                   rosso: "#", nero: "#" },
    { nome: "Caronte",                       rosso: "#", nero: "#" },
    { nome: "Limbo",                         rosso: "#", nero: "#" },
    { nome: "Minosse",                       rosso: "#", nero: "#" },
    { nome: "Lussuriosi e tempesta",         rosso: "#", nero: "#" },
    { nome: "Paolo e Francesca",             rosso: "#", nero: "#" },
    { nome: "Cerbero – Golosi",              rosso: "#", nero: "#" },
    { nome: "Ciacco",                        rosso: "#", nero: "#" },
    { nome: "Pluto e gli Avari",             rosso: "#", nero: "#" },
    { nome: "Filippo Argenti",               rosso: "#", nero: "#" },
    { nome: "Mura, Furie e Medusa",          rosso: "#", nero: "#" },
    { nome: "Messo Celeste",                 rosso: "#", nero: "#" },
    { nome: "Farinata degli Uberti",         rosso: "#", nero: "#" },
    { nome: "Centauro Nesso e Flegetonte",   rosso: "#", nero: "#" },
    { nome: "Selva dei Suicidi e le Arpie",  rosso: "#", nero: "#" },
    { nome: "Pier delle Vigne",              rosso: "#", nero: "#" },
    { nome: "Capaneo",                       rosso: "#", nero: "#" },
    { nome: "Brunetto Latini",               rosso: "#", nero: "#" },
    { nome: "Gerione",                       rosso: "#", nero: "#" },
    { nome: "Simoniaci – Bonifacio VIII",    rosso: "#", nero: "#" },
    { nome: "Indovini",                      rosso: "#", nero: "#" },
    { nome: "Malebranche",                   rosso: "#", nero: "#" },
    { nome: "Ipocriti",                      rosso: "#", nero: "#" },
    { nome: "I Ladri",                       rosso: "#", nero: "#" },
    { nome: "Ulisse e Diomede",              rosso: "#", nero: "#" },
    { nome: "Il folle volo",                 rosso: "#", nero: "#" },
    { nome: "Pozzo dei Giganti",             rosso: "#", nero: "#" },
    { nome: "Conte Ugolino",                 rosso: "#", nero: "#" },
    { nome: "Lucifero",                      rosso: "#", nero: "#" },
    { nome: "Giuda e i Cesaricidi",          rosso: "#", nero: "#" },
    { nome: "A riveder le stelle",           rosso: "#", nero: "#" },
  ];

  /* ── RUOTA ────────────────────────────────────────────────────── */
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const SIZE = canvas.width;
  const cx = SIZE / 2, cy = SIZE / 2, r = SIZE / 2 - 6;
  const SECTORS = 12;
  let angle = 0, spinning = false, animFrame;

  function flamePath(cx2, bx, by, w, h, flicker) {
    cx2.beginPath();
    cx2.moveTo(bx, by + h);
    cx2.bezierCurveTo(bx - w*0.1, by + h*0.6, bx + w*0.15 + flicker, by + h*0.35, bx + w*0.5, by);
    cx2.bezierCurveTo(bx + w*0.5, by + h*0.15, bx + w*0.85 - flicker, by + h*0.35, bx + w*1.1, by + h*0.6);
    cx2.lineTo(bx + w, by + h);
    cx2.closePath();
  }

  function drawSectorFlame(a, i) {
    const arc = (Math.PI * 2) / SECTORS;
    const mid = a + i * arc + arc / 2;
    const dist = r * 0.52;
    ctx.save();
    ctx.translate(cx + Math.cos(mid) * dist, cy + Math.sin(mid) * dist);
    ctx.rotate(mid + Math.PI / 2);
    const t = Date.now();
    const fw = 24, fh = 33, fl = Math.sin(t / 180 + i) * 3;
    const g1 = ctx.createLinearGradient(0, 0, 0, -fh);
    g1.addColorStop(0, '#fbbf24'); g1.addColorStop(0.4, '#f97316');
    g1.addColorStop(0.75, '#dc2626'); g1.addColorStop(1, 'rgba(100,0,0,0)');
    ctx.fillStyle = g1;
    flamePath(ctx, -fw/2, -fh, fw, fh, fl);
    ctx.fill();
    const fw2 = 13, fh2 = 20, fl2 = Math.sin(t / 130 + i + 2) * 2;
    const g2 = ctx.createLinearGradient(0, 0, 0, -fh2);
    g2.addColorStop(0, '#fde68a'); g2.addColorStop(0.5, '#fbbf24'); g2.addColorStop(1, 'rgba(251,191,36,0)');
    ctx.fillStyle = g2;
    flamePath(ctx, -fw2/2, -fh2, fw2, fh2, fl2);
    ctx.fill();
    ctx.restore();
  }

  function drawWheel(a) {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const arc = (Math.PI * 2) / SECTORS;
    for (let i = 0; i < SECTORS; i++) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a + i * arc, a + (i+1) * arc);
      ctx.closePath();
      ctx.fillStyle = i % 2 === 0 ? '#5a0000' : '#111';
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    for (let i = 0; i < SECTORS; i++) drawSectorFlame(a, i);
    ctx.beginPath();
    ctx.arc(cx, cy, r + 1, 0, Math.PI * 2);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, 26, 0, Math.PI * 2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function idleLoop() {
    if (!spinning) { drawWheel(angle); animFrame = requestAnimationFrame(idleLoop); }
  }
  idleLoop();

  function spin() {
    if (spinning) return;
    spinning = true;
    cancelAnimationFrame(animFrame);
    document.getElementById('spin-btn').disabled = true;
    document.getElementById('result-box').style.display = 'none';
    const totalRot = Math.PI * 2 * (6 + Math.random() * 3);
    const duration = 3600, start = performance.now(), startAngle = angle;
    (function animate(now) {
      const t = Math.min((now - start) / duration, 1);
      angle = startAngle + totalRot * (1 - Math.pow(1 - t, 4));
      drawWheel(angle);
      t < 1 ? requestAnimationFrame(animate) : (spinning = false, idleLoop(), showResult(angle));
    })(performance.now());
  }

  function showResult(a) {
    const pointerX = cx;
    const pointerY = 10;
    const pixel = ctx.getImageData(pointerX, pointerY, 1, 1).data;
    const isRosso = pixel[0] > 80;

    const box = document.getElementById('result-box');
    box.className = 'result-box ' + (isRosso ? 'rosso' : 'nero');
    box.style.display = 'block';
    document.getElementById('result-tag').textContent = isRosso ? 'Carta Ripasso' : 'Carta Rischio / Opportunità';
    document.getElementById('result-title').textContent = isRosso
      ? 'Quale contenuto vuoi ripassare?'
      : 'Svela il rischio o l\'opportunità che ti attende';

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    carte.forEach(c => {
      const el = document.createElement('a');
      el.className = 'card-link';
      el.href = isRosso ? c.rosso : c.nero;
      el.innerHTML = c.nome + '<small>' + (isRosso ? 'carta rossa →' : 'carta nera →') + '</small>';
      grid.appendChild(el);
    });

    document.getElementById('spin-btn').disabled = false;
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.getElementById('spin-btn').addEventListener('click', spin);
  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('result-box').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
</body>
</html>
